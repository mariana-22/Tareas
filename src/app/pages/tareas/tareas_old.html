<header class="header">

  <div class="logo-section">


    <div class="logo-text">
      <h1>Orbit</h1>
      <p>Gestión inteligente de proyectos y tareas</p>
    </div>

  </div>

</header>

<div class="container">

  <div class="top-section">
    <h2>Tareas</h2>
    <button class="btn-add" type="button" (click)="showForm = !showForm">
      {{ showForm ? 'Cerrar formulario' : '+ Nueva Tarea' }}
    </button>
  </div>

  <div class="form-card" *ngIf="showForm">
    <h3>{{ editing ? 'Editar tarea' : 'Nueva tarea' }}</h3>
    <div class="form-group">
      <label>Título</label>
      <input type="text" [(ngModel)]="newTarea.titulo" placeholder="Nombre de la tarea" />
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="newTarea.descripcion" placeholder="Descripción"></textarea>
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select [(ngModel)]="newTarea.estado">
        <option value="pendiente">Pendiente</option>
        <option value="en progreso">En Progreso</option>
        <option value="completada">Completada</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="button" class="save" (click)="guardarTarea()">Guardar</button>
      <button type="button" class="cancel" (click)="cancelarEdicion()">Cancelar</button>
    </div>
  </div>

  <div class="tasks-grid">
    <div class="task-card" *ngFor="let tarea of tareas">
      <h3>{{ tarea.titulo }}</h3>
      <p>{{ tarea.descripcion }}</p>
      <div class="status" [ngClass]="{
        pending: tarea.estado === 'pendiente',
        progress: tarea.estado === 'en progreso',
        completed: tarea.estado === 'completada'
      }">
        {{ tarea.estado || 'pendiente' | titlecase }}
      </div>
      <div class="actions">
        <button class="edit" type="button" (click)="editarTarea(tarea)">Editar</button>
        <button class="delete" type="button" (click)="eliminarTarea(tarea.id)">Eliminar</button>
      </div>
    </div>
    <div *ngIf="tareas.length === 0" class="no-data">
      No hay tareas registradas.
    </div>
  </div>
</div>
